        <script>
            async function updateCounter() {
                try {
                    const response = await fetch(
                        "https://hdkleyqqj7.execute-api.eu-north-1.amazonaws.com/count",

                    const data = await response.json();

                        "Error loading count";
                }
            }
            updateCounter();
